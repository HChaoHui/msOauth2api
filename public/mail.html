<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱系统</title>
  <link rel="stylesheet" href="/mail.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js"></script>
</head>
<body>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="container">
    <header class="header">
      <h1>邮箱系统</h1>
    </header>

    <main class="main">
      <!-- 账号列表区域 -->
      <div id="account-section" class="section active">
        <div class="toolbar" id="toolbar">
          <input type="text" class="search-input" id="search-input" placeholder="搜索账号">
          <input type="password" class="password-input" id="toolbar-password" placeholder="验证密码">
          <button class="btn btn-primary" data-action="import">+ 导入账号</button>
          <button class="btn btn-danger" data-action="delete">批量删除</button>
        </div>

        <div class="table-wrap">
          <table class="table" id="email-table">
            <thead>
              <tr>
                <th class="check-col"><input type="checkbox" id="select-all"></th>
                <th>账号</th>
                <th>Client ID</th>
                <th>Refresh Token</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="pagination-wrap">
          <span class="pagination-info" id="pagination-info">共 0 条</span>
          <div class="pagination" id="pagination-btns"></div>
          <select class="per-page" id="per-page">
            <option value="10">10 条/页</option>
            <option value="20">20 条/页</option>
            <option value="50">50 条/页</option>
            <option value="100">100 条/页</option>
          </select>
        </div>
      </div>

      <!-- 邮件列表区域 -->
      <div id="mail-section" class="section">
        <div class="mail-section">
          <h2>
            <button class="back-btn" id="back-btn">← 返回</button>
            邮件列表
          </h2>

          <div class="table-wrap">
            <table class="table" id="mail-table">
              <thead>
                <tr>
                  <th>发件人</th>
                  <th>主题</th>
                  <th>日期</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="pagination-wrap">
            <div class="pagination" id="mail-pagination-btns"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 导入弹窗 -->
  <div class="modal-overlay import-modal" id="import-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>导入账号</h3>
      </div>
      <div class="modal-body">
        <div class="upload-box" id="upload-box">
          <p>点击或拖拽文件到此处上传</p>
          <p id="file-info"></p>
          <input type="file" id="import-file" accept=".txt">
        </div>
        <div class="form-group">
          <label>分隔符</label>
          <input type="text" id="import-delimiter" value="----" placeholder="分隔符">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="mailApp.closeModal()">取消</button>
        <button class="btn btn-primary" id="import-confirm">导入</button>
      </div>
    </div>
  </div>

  <!-- 邮件详情弹窗 -->
  <div class="modal-overlay mail-modal" id="mail-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="mail-modal-title"></h3>
      </div>
      <div class="modal-body">
        <div class="mail-meta">
          <p><strong>发件人：</strong><span id="mail-modal-sender"></span></p>
          <p><strong>日期：</strong><span id="mail-modal-date"></span></p>
        </div>
        <div class="mail-content" id="mail-modal-content"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="mailApp.closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- AI 解读弹窗 -->
  <div class="modal-overlay ai-modal" id="ai-modal">
    <div class="modal ai-modal-content">
      <div class="modal-header">
        <h3>AI 解读</h3>
      </div>
      <div class="modal-body">
        <div class="ai-analysis-card">
          <div class="ai-status" id="ai-status">正在连接 AI 解读服务...</div>
          <div class="ai-thinking" id="ai-thinking"></div>
          <div class="ai-summary ai-cursor" id="ai-summary">准备生成摘要...</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="ai-close">停止</button>
      </div>
    </div>
  </div>

  <script src="/mail.js"></script>
</body>
</html>
